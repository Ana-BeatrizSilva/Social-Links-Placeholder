<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Links Placeholder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="main-container">
        <img src="media/image icon.png" alt="profile image" class="profile-image">
        <h1 class="main-title">Newbie Developer</h1>
        <h2 class="sub-title">London, United Kingdom</h2>
        <p>Full-stack developer and avid gamer</p>
        <h2 class="skills-title">My Social Links:</h2>
        <div class="social-buttons">
            <a class="github-btn" href="https://github.com/" target="_blank">GitHub</a><br>
            <a class="linkedin-btn" href="https://br.linkedin.com/" target="_blank">LinkedIn</a><br>
            <a class="twitter-btn" href="https://x.com/?lang=pt" target="_blank">Twitter</a><br>
            <a class="instagram-btn" href="https://www.instagram.com/" target="_blank">Instagram</a>
        </div>
    </div>
    
</body>
</html>
